<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Artikel - Griya Asri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col"
  >
    <nav
      class="bg-white border-b border-slate-100 shadow-sm h-20 flex items-center sticky top-0 z-50"
    >
      <div
        class="max-w-4xl mx-auto px-4 w-full flex justify-between items-center"
      >
        <a
          href="index.html"
          class="text-2xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent"
          >GriyaAsri.</a
        >
        <a
          href="index.html#berita"
          class="text-sm font-medium text-slate-600 hover:text-emerald-600 transition"
          ><i class="fa-solid fa-arrow-left mr-2"></i>Kembali</a
        >
      </div>
    </nav>

    <main class="flex-grow py-12">
      <article
        class="max-w-3xl mx-auto px-4 bg-white p-6 sm:p-10 rounded-3xl border border-slate-100 shadow-sm space-y-6"
        id="article-view"
      >
        <div class="text-center py-12 text-slate-400">
          <i class="fa-solid fa-spinner animate-spin text-3xl mb-2"></i>
          <p>Memuat isi artikel...</p>
        </div>
      </article>
    </main>

    <footer
      class="bg-slate-950 text-slate-600 py-6 text-center text-sm border-t border-slate-900"
    >
      <p>&copy; 2026 GriyaAsri Properti. All rights reserved.</p>
    </footer>

    <script src="berita.js"></script>
  </body>
</html>
