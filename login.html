<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Griya Asri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-slate-100 font-['Plus_Jakarta_Sans'] min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200/80 max-w-md w-full space-y-6"
    >
      <div class="text-center space-y-2">
        <h1 class="text-2xl font-bold text-slate-900" id="auth-title">
          Masuk ke Dashboard
        </h1>
        <p class="text-xs text-slate-500" id="auth-subtitle">
          Silakan masukkan akun admin GriyaAsri Anda.
        </p>
      </div>

      <form id="auth-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-600 mb-1.5"
            >Email</label
          >
          <input
            type="email"
            id="auth-email"
            required
            placeholder="admin@griyaasri.com"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-emerald-500 transition"
          />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-600 mb-1.5"
            >Password</label
          >
          <input
            type="password"
            id="auth-password"
            required
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-emerald-500 transition"
          />
        </div>
        <button
          type="submit"
          id="btn-auth-submit"
          class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-700 transition text-sm"
        >
          Masuk
        </button>
      </form>

      <div class="text-center">
        <button
          id="toggle-auth-mode"
          class="text-xs font-semibold text-emerald-600 hover:underline"
        >
          Belum punya akun? Daftar Admin Baru
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

      // Sesuaikan dengan kredensial Firebase Console Anda
      const firebaseConfig = {
        apiKey: "AIzaSyAja6FfF_EW_N9y8pXmDX-10e0e51DJ4Cg",
        authDomain: "project-home-54337.firebaseapp.com",
        projectId: "project-home-54337",
        storageBucket: "project-home-54337.firebasestorage.app",
        messagingSenderId: "548607283431",
        appId: "1:548607283431:web:1f58c56ce8b3c73a121242",
        measurementId: "G-S8YHM7RC70",
      };
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      let isLoginMode = true;
      const authForm = document.getElementById("auth-form");
      const authTitle = document.getElementById("auth-title");
      const authSubtitle = document.getElementById("auth-subtitle");
      const btnAuthSubmit = document.getElementById("btn-auth-submit");
      const toggleAuthMode = document.getElementById("toggle-auth-mode");

      toggleAuthMode.addEventListener("click", () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
          authTitle.innerText = "Masuk ke Dashboard";
          authSubtitle.innerText =
            "Silakan masukkan akun admin GriyaAsri Anda.";
          btnAuthSubmit.innerText = "Masuk";
          toggleAuthMode.innerText = "Belum punya akun? Daftar Admin Baru";
        } else {
          authTitle.innerText = "Daftar Admin Baru";
          authSubtitle.innerText = "Buat akun akses kelola website properti.";
          btnAuthSubmit.innerText = "Daftar Sekarang";
          toggleAuthMode.innerText = "Sudah punya akun? Masuk ke Dashboard";
        }
      });

      authForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("auth-email").value;
        const password = document.getElementById("auth-password").value;

        try {
          if (isLoginMode) {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Login Berhasil!");
          } else {
            await createUserWithEmailAndPassword(auth, email, password);
            alert("Registrasi Berhasil! Silakan masuk.");
            location.reload();
            return;
          }
          window.location.href = "admin.html";
        } catch (error) {
          alert("Gagal: " + error.message);
        }
      });
    </script>
  </body>
</html>
