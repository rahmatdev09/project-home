<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Griya Asri</title>
    <link rel="icon" type="image/png" href="/image/favicon-rounded.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-slate-50 font-['Plus_Jakarta_Sans'] min-h-screen flex items-center justify-center p-4 relative overflow-hidden"
  >
    <div
      class="absolute top-0 left-0 w-96 h-96 bg-indigo-200/30 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 -z-10"
    ></div>
    <div
      class="absolute bottom-0 right-0 w-96 h-96 bg-emerald-200/20 rounded-full blur-3xl translate-x-1/2 translate-y-1/2 -z-10"
    ></div>

    <div
      class="bg-white/90 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/80 border border-white max-w-md w-full space-y-8 transition-all"
    >
      <div class="text-center space-y-3">
        <div
          class="mx-auto w-12 h-12 bg-emerald-600/10 rounded-2xl flex items-center justify-center mb-2 border border-emerald-100"
        >
          <span class="text-emerald-600 font-black text-xl">GA</span>
        </div>
        <h1
          class="text-3xl font-black text-slate-800 tracking-tight"
          id="auth-title"
        >
          Masuk ke Dashboard
        </h1>
        <p class="text-sm text-slate-400 font-medium" id="auth-subtitle">
          Silakan masukkan akun admin GriyaAsri Anda.
        </p>
      </div>

      <form id="auth-form" class="space-y-5">
        <div class="space-y-2">
          <label
            class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1"
            >Email</label
          >
          <input
            type="email"
            id="auth-email"
            required
            placeholder="admin@griyaasri.com"
            class="w-full px-5 py-4 bg-slate-50 border-transparent rounded-2xl outline-none text-sm font-medium focus:bg-white focus:ring-2 focus:ring-emerald-500 shadow-inner transition-all text-slate-700 placeholder:text-slate-300"
          />
        </div>
        <div class="space-y-2">
          <label
            class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1"
            >Password</label
          >
          <input
            type="password"
            id="auth-password"
            required
            placeholder="••••••••"
            class="w-full px-5 py-4 bg-slate-50 border-transparent rounded-2xl outline-none text-sm font-medium focus:bg-white focus:ring-2 focus:ring-emerald-500 shadow-inner transition-all text-slate-700 placeholder:text-slate-300"
          />
        </div>

        <button
          type="submit"
          id="btn-auth-submit"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-emerald-200 transition-all active:scale-[0.97] text-sm tracking-widest uppercase flex items-center justify-center gap-3 min-h-[52px]"
        >
          <span id="btn-text">Masuk</span>
          <svg
            id="btn-spinner"
            class="animate-spin h-5 w-5 text-white hidden"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        </button>
      </form>

      <div class="text-center pt-2">
        <button
          id="toggle-auth-mode"
          class="text-xs font-bold text-emerald-600 hover:text-emerald-700 transition"
        >
          Belum punya akun? Daftar Admin Baru
        </button>
      </div>
    </div>

    <div
      id="notification-modal"
      class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300"
    >
      <div
        class="bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100 max-w-sm w-full text-center space-y-6 scale-90 transition-all duration-300"
        id="modal-box"
      >
        <div
          id="modal-icon-bg"
          class="mx-auto w-16 h-16 rounded-full flex items-center justify-center"
        >
          <svg
            id="modal-icon-success"
            class="h-8 w-8 hidden"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="3"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M5 13l4 4L19 7"
            />
          </svg>
          <svg
            id="modal-icon-error"
            class="h-8 w-8 hidden"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="3"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </div>
        <div class="space-y-2">
          <h3 id="modal-title" class="text-xl font-black text-slate-800">
            Status
          </h3>
          <p
            id="modal-message"
            class="text-sm text-slate-500 font-medium leading-relaxed"
          >
            Pesan status sistem.
          </p>
        </div>
        <button
          id="modal-close-btn"
          class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 rounded-2xl text-sm transition-all"
        >
          Mengerti
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

      // Kredensial Firebase Console Anda
      const firebaseConfig = {
        apiKey: "AIzaSyAja6FfF_EW_N9y8pXmDX-10e0e51DJ4Cg",
        authDomain: "project-home-54337.firebaseapp.com",
        projectId: "project-home-54337",
        storageBucket: "project-home-54337.firebasestorage.app",
        messagingSenderId: "548607283431",
        appId: "1:548607283431:web:1f58c56ce8b3c73a121242",
        measurementId: "G-S8YHM7RC70",
      };
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      let isLoginMode = true;
      const authForm = document.getElementById("auth-form");
      const authTitle = document.getElementById("auth-title");
      const authSubtitle = document.getElementById("auth-subtitle");
      const btnAuthSubmit = document.getElementById("btn-auth-submit");
      const toggleAuthMode = document.getElementById("toggle-auth-mode");

      // New Element Handlers for UI state
      const btnText = document.getElementById("btn-text");
      const btnSpinner = document.getElementById("btn-spinner");
      const notifModal = document.getElementById("notification-modal");
      const modalBox = document.getElementById("modal-box");
      const modalIconBg = document.getElementById("modal-icon-bg");
      const modalIconSuccess = document.getElementById("modal-icon-success");
      const modalIconError = document.getElementById("modal-icon-error");
      const modalTitle = document.getElementById("modal-title");
      const modalMessage = document.getElementById("modal-message");
      const modalCloseBtn = document.getElementById("modal-close-btn");

      // Custom Dynamic Modal Notification Function
      function showModalStatus(type, title, message, callback = null) {
        modalIconSuccess.classList.add("hidden");
        modalIconError.classList.add("hidden");
        modalIconBg.className =
          "mx-auto w-16 h-16 rounded-full flex items-center justify-center ";

        if (type === "success") {
          modalIconSuccess.classList.remove("hidden");
          modalIconBg.classList.add("bg-emerald-50", "text-emerald-600");
        } else {
          modalIconError.classList.remove("hidden");
          modalIconBg.classList.add("bg-rose-50", "text-rose-600");
        }

        modalTitle.innerText = title;
        modalMessage.innerText = message;

        // Open animations
        notifModal.classList.remove("opacity-0", "pointer-events-none");
        modalBox.classList.remove("scale-90");

        const closeHandler = () => {
          notifModal.classList.add("opacity-0", "pointer-events-none");
          modalBox.classList.add("scale-90");
          modalCloseBtn.removeEventListener("click", closeHandler);
          if (callback) callback();
        };
        modalCloseBtn.addEventListener("click", closeHandler);
      }

      // Toggle Login / Register UI state
      toggleAuthMode.addEventListener("click", () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
          authTitle.innerText = "Masuk ke Dashboard";
          authSubtitle.innerText =
            "Silakan masukkan akun admin GriyaAsri Anda.";
          btnText.innerText = "Masuk";
          toggleAuthMode.innerText = "Belum punya akun? Daftar Admin Baru";
        } else {
          authTitle.innerText = "Daftar Admin Baru";
          authSubtitle.innerText = "Buat akun akses kelola website properti.";
          btnText.innerText = "Daftar Sekarang";
          toggleAuthMode.innerText = "Sudah punya akun? Masuk ke Dashboard";
        }
      });

      // Form Handling Action
      authForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("auth-email").value;
        const password = document.getElementById("auth-password").value;

        // Trigger Loading State
        btnAuthSubmit.disabled = true;
        btnSpinner.classList.remove("hidden");
        btnAuthSubmit.classList.add("opacity-80", "cursor-not-allowed");

        try {
          if (isLoginMode) {
            await signInWithEmailAndPassword(auth, email, password);
            showModalStatus(
              "success",
              "Login Berhasil!",
              "Selamat datang kembali! Anda dialihkan ke panel admin.",
              () => {
                window.location.href = "/admin/";
              },
            );
          } else {
            await createUserWithEmailAndPassword(auth, email, password);
            showModalStatus(
              "success",
              "Registrasi Berhasil!",
              "Akun admin baru Anda siap digunakan. Silakan masuk.",
              () => {
                location.reload();
              },
            );
            return;
          }
        } catch (error) {
          // Format standard errors so they appear cleaner
          let errorCleanMsg = error.message.replace("Firebase: ", "");
          showModalStatus("error", "Autentikasi Gagal", errorCleanMsg);

          // Reset Loading State on Failure
          btnAuthSubmit.disabled = false;
          btnSpinner.classList.add("hidden");
          btnAuthSubmit.classList.remove("opacity-80", "cursor-not-allowed");
        }
      });
    </script>
  </body>
</html>
